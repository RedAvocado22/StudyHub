<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>My Courses</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">My Courses</h4>
            <a class="btn btn-outline-primary btn-sm" th:href="@{/courses}">
                <i class="bi bi-plus-circle me-1"></i>Browse More Courses
            </a>
        </div>

        <div class="row g-4" th:if="${#lists.isEmpty(courses)}">
            <div class="col-12">
                <div class="border rounded-3 p-4 text-center text-muted">
                    You have no approved courses yet.
                </div>
            </div>
        </div>

        <div class="row g-4" th:if="${!#lists.isEmpty(courses)}">
            <div class="col-lg-6" th:each="course : ${courses}">
                <div class="card h-100 shadow-sm">
                    <div class="row g-0 h-100">
                        <div class="col-md-5">
                            <img class="img-fluid h-100 object-fit-cover rounded-start"
                                 th:src="${course.thumbnailUrl}"
                                 th:alt="${course.title}">
                        </div>
                        <div class="col-md-7">
                            <div class="card-body d-flex flex-column h-100">
                                <h5 class="card-title" th:text="${course.title}"></h5>
                                <p class="text-muted mb-2">
                                    Enrolled on
                                    <span th:text="${#temporals.format(course.enrolledAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
                                </p>
                                <div class="mb-3">
                                    <div class="d-flex justify-content-between">
                                        <span class="small text-muted">Progress</span>
                                        <span class="small text-muted" th:text="${course.progress} + '%'" ></span>
                                    </div>
                                    <div class="progress">
                                        <div class="progress-bar" role="progressbar"
                                             th:style="|width: ${course.progress}%;|"
                                             th:attr="aria-valuenow=${course.progress}" aria-valuemin="0" aria-valuemax="100"></div>
                                    </div>
                                </div>
                                <div class="mt-auto d-flex gap-2">
                                    <a class="btn btn-primary btn-sm" th:href="@{/my-courses/{id}/lessons(id=${course.courseId})}">
                                        <i class="bi bi-play-circle me-1"></i>Start Learning
                                    </a>
                                    <span class="badge bg-light text-dark border" th:text="${course.price}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
