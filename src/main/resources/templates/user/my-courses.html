<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>My Courses</title>
</head>
<body>
<div layout:fragment="content">
    <section class="py-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">My Courses</h2>
                <a class="btn btn-outline-primary btn-sm" th:href="@{/courses}">
                    <i class="bi bi-plus-circle me-1"></i>Browse More Courses
                </a>
            </div>

            <div class="row g-4" th:if="${not #lists.isEmpty(courses)}">
                <div class="col-md-6 col-lg-4" th:each="course : ${courses}">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="ratio ratio-16x9">
                            <img th:src="${course.thumbnailUrl}"
                                 th:alt="${course.title}"
                                 class="rounded-top object-fit-cover">
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title fw-semibold" th:text="${course.title}"></h5>
                            <p class="text-muted small mb-3">
                                <i class="bi bi-calendar-check me-1"></i>Enrolled on
                                <span th:text="${#temporals.format(course.enrolledAt, 'yyyy-MM-dd')}"></span>
                            </p>

                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <span class="small text-muted">Progress</span>
                                    <span class="small fw-bold text-primary" th:text="${course.progress} + '%'"></span>
                                </div>
                                <div class="progress" style="height: 8px;">
                                    <div class="progress-bar progress-bar-striped" role="progressbar"
                                         th:style="|width: ${course.progress}%;|"
                                         th:attr="aria-valuenow=${course.progress}" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mt-auto pt-3 border-top">
                                <span class="fw-bold text-primary"
                                      th:text="${#numbers.formatDecimal(course.price, 1, 'COMMA', 0, 'NONE') + ' ₫'}"></span>
                                <a th:href="@{/my-courses/{id}/lessons(id=${course.courseId})}"
                                   class="btn btn-primary btn-sm px-4 rounded-pill">
                                    <i class="bi bi-play-circle me-1"></i>Learn
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center text-muted py-5" th:if="${#lists.isEmpty(courses)}">
                <i class="bi bi-collection display-4 d-block mb-3"></i>
                <p class="mb-0">You have no approved courses yet.</p>
                <a th:href="@{/courses}" class="btn btn-primary mt-3">Browse Courses</a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
