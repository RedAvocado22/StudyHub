<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${post.title + ' - StudyHub'}">Blog Detail</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-5">
        <div class="row g-4">
            <!-- Blog Post Content -->
            <div class="col-lg-8">
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/blogs}" class="text-decoration-none">Blogs</a></li>
                        <li class="breadcrumb-item active" aria-current="page" th:text="${#strings.abbreviate(post.title, 30)}">Post Title</li>
                    </ol>
                </nav>

                <article class="card border-0 shadow-sm overflow-hidden mb-4">
                    <img th:if="${post.thumbnail != null}" th:src="${post.thumbnail}" 
                         class="card-img-top object-fit-cover" style="height: 400px;" th:alt="${post.title}">
                    
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex align-items-center mb-3">
                            <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill me-3" th:text="${post.category?.name}">Category</span>
                            <span class="text-muted small">
                                <i class="bi bi-calendar3 me-1"></i>
                                <span th:text="${#temporals.format(post.updatedAt, 'dd MMM, yyyy HH:mm')}">Date</span>
                            </span>
                        </div>

                        <h1 class="display-6 fw-bold mb-4" th:text="${post.title}">Blog Title</h1>

                        <div class="d-flex align-items-center mb-5 pb-3 border-bottom">
                            <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 48px; height: 48px;">
                                <i class="bi bi-person-fill text-primary fs-4"></i>
                            </div>
                            <div>
                                <div class="fw-bold mb-0" th:text="${post.author?.fullName}">Author Name</div>
                                <div class="text-muted small">StudyHub Contributor</div>
                            </div>
                        </div>

                        <div class="blog-content mb-5 lh-lg" th:utext="${post.content}">
                            Blog content goes here...
                        </div>
                    </div>
                </article>

                <!-- Discussions Section -->
                <div class="card border-0 shadow-sm" id="discussions">
                    <div class="card-header bg-transparent p-4 border-bottom">
                        <h4 class="fw-bold mb-0"><i class="bi bi-chat-left-dots me-2"></i>Discussions</h4>
                    </div>
                    <div class="card-body p-4">
                        <!-- Comment Form -->
                        <div class="mb-5">
                            <form th:action="@{/blogs/comment}" method="post">
                                <input type="hidden" name="postId" th:value="${post.id}">
                                <div class="d-flex gap-3">
                                    <div class="bg-secondary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 40px; height: 40px;">
                                        <i class="bi bi-person text-secondary"></i>
                                    </div>
                                    <div class="flex-grow-1">
                                        <textarea name="comment" class="form-control bg-light border-0" 
                                                  rows="3" placeholder="Share your thoughts on this article..." required></textarea>
                                        <div class="text-end mt-2">
                                            <button type="submit" class="btn btn-primary btn-sm px-4">Post Comment</button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <!-- Comments List -->
                        <div class="comments-list">
                            <div th:if="${comments.empty}" class="text-center py-4 text-muted small">
                                <p>No comments yet. Be the first to start the discussion!</p>
                            </div>

                            <div th:each="co : ${comments}" class="d-flex gap-3 mb-4">
                                <div class="bg-secondary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 40px; height: 40px;">
                                    <i class="bi bi-person-fill text-secondary"></i>
                                </div>
                                <div class="flex-grow-1">
                                    <div class="bg-light p-3 rounded-4 mb-2">
                                        <div class="d-flex justify-content-between align-items-center mb-1">
                                            <span class="fw-bold small" th:text="${co.user.fullName}">User Name</span>
                                            <span class="text-muted" style="font-size: 0.7rem;">Just now</span>
                                        </div>
                                        <div class="small text-dark" th:text="${co.comment}">Comment text...</div>
                                    </div>
                                    
                                    <div class="ms-2 small">
                                        <a class="text-decoration-none text-muted fw-semibold me-3" data-bs-toggle="collapse" th:href="'#replyBox-' + ${co.commentId}" role="button">
                                            <i class="bi bi-reply me-1"></i>Reply
                                        </a>
                                    </div>

                                    <!-- Reply Box -->
                                    <div class="collapse mt-3" th:id="'replyBox-' + ${co.commentId}">
                                        <div class="ps-3 border-start border-2 border-light ms-2">
                                            <form th:action="@{/blogs/comment}" method="post" class="mb-4">
                                                <input type="hidden" name="postId" th:value="${post.id}">
                                                <input type="hidden" name="parentId" th:value="${co.commentId}">
                                                <div class="input-group input-group-sm">
                                                    <input name="comment" type="text" class="form-control bg-light border-0" 
                                                           placeholder="Write a reply..." required>
                                                    <button class="btn btn-primary px-3" type="submit">Reply</button>
                                                </div>
                                            </form>

                                            <!-- Replies -->
                                            <div th:each="com : ${co.replies}" class="d-flex gap-2 mb-3">
                                                <div class="bg-secondary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 32px; height: 32px;">
                                                    <i class="bi bi-person text-secondary small"></i>
                                                </div>
                                                <div class="flex-grow-1 bg-light p-2 rounded-3">
                                                    <div class="fw-bold mb-0" style="font-size: 0.75rem;" th:text="${com.user.fullName}">Replier Name</div>
                                                    <div style="font-size: 0.8rem;" th:text="${com.comment}">Reply text...</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="col-lg-4">
                <!-- Search -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">Search</h5>
                        <form th:action="@{/blogs/blogs-search}" method="post">
                            <div class="input-group">
                                <input type="text" name="title" class="form-control border-end-0" 
                                       placeholder="Search articles...">
                                <button class="btn btn-outline-secondary border-start-0" type="submit">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Categories -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">Categories</h5>
                        <div class="list-group list-group-flush mx-n3">
                            <a th:href="@{/blogs}" class="list-group-item list-group-item-action border-0 px-3 d-flex justify-content-between align-items-center">
                                <span><i class="bi bi-grid-fill me-2 opacity-50"></i>All Articles</span>
                            </a>
                            <a th:each="c : ${categories}" 
                               th:href="@{/blogs/blogs-category/{id}(id=${c.id})}"
                               class="list-group-item list-group-item-action border-0 px-3 d-flex justify-content-between align-items-center"
                               th:classappend="${post.category?.id == c.id ? 'active bg-primary bg-opacity-10 text-primary fw-bold' : ''}">
                                <span><i class="bi bi-chevron-right me-2 small opacity-50"></i><span th:text="${c.name}">Category Name</span></span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .blog-content img { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 1.5rem 0; }
        .blog-content blockquote { border-left: 4px solid #0d6efd; padding-left: 1.5rem; font-style: italic; color: #6c757d; }
        .rounded-4 { border-radius: 1rem !important; }
    </style>
</div>
</body>
</html>
