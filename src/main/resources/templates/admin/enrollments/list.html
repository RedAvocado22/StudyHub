<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>Course Enrollments</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Course Enrollments</h4>
        <a th:href="@{/admin/enrollments/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Add New
        </a>
    </div>

    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form th:action="@{/admin/enrollments}" method="get" class="row g-2 align-items-end">
                <input type="hidden" name="sortBy" th:value="${sortBy}">
                <input type="hidden" name="direction" th:value="${direction}">
                <div class="col-12 col-md-4">
                    <label class="form-label small text-muted mb-1">Search</label>
                    <input type="text" name="keyword" class="form-control form-control-sm"
                           placeholder="Full Name, Email, Course"
                           th:value="${keyword}"/>
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label small text-muted mb-1">Course</label>
                    <select name="courseId" class="form-select form-select-sm">
                        <option value="">All Courses</option>
                        <option th:each="c : ${courses}"
                                th:value="${c.id}"
                                th:text="${c.title}"
                                th:selected="${c.id == selectedCourseId}">
                        </option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Status</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="">All Status</option>
                        <option th:each="s : ${statuses}"
                                th:value="${s}"
                                th:text="${s}"
                                th:selected="${s == selectedStatus}">
                        </option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-search me-1"></i>Filter
                    </button>
                    <a th:href="@{/admin/enrollments}" class="btn btn-outline-secondary btn-sm ms-1">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3">
                            <a class="text-decoration-none text-dark small fw-bold"
                               th:href="@{/admin/enrollments(keyword=${keyword},courseId=${selectedCourseId},status=${selectedStatus},sortBy='id',direction=${sortBy == 'id' and direction == 'asc' ? 'desc' : 'asc'})}">
                                ID <i class="bi bi-arrow-down-up ms-1"></i>
                            </a>
                        </th>
                        <th>
                            <a class="text-decoration-none text-dark small fw-bold"
                               th:href="@{/admin/enrollments(keyword=${keyword},courseId=${selectedCourseId},status=${selectedStatus},sortBy='course.title',direction=${sortBy == 'course.title' and direction == 'asc' ? 'desc' : 'asc'})}">
                                Course <i class="bi bi-arrow-down-up ms-1"></i>
                            </a>
                        </th>
                        <th>
                            <a class="text-decoration-none text-dark small fw-bold"
                               th:href="@{/admin/enrollments(keyword=${keyword},courseId=${selectedCourseId},status=${selectedStatus},sortBy='fullName',direction=${sortBy == 'fullName' and direction == 'asc' ? 'desc' : 'asc'})}">
                                User Info <i class="bi bi-arrow-down-up ms-1"></i>
                            </a>
                        </th>
                        <th>
                            <a class="text-decoration-none text-dark small fw-bold"
                               th:href="@{/admin/enrollments(keyword=${keyword},courseId=${selectedCourseId},status=${selectedStatus},sortBy='enrolledAt',direction=${sortBy == 'enrolledAt' and direction == 'asc' ? 'desc' : 'asc'})}">
                                Enrolled At <i class="bi bi-arrow-down-up ms-1"></i>
                            </a>
                        </th>
                        <th>
                            <a class="text-decoration-none text-dark small fw-bold"
                               th:href="@{/admin/enrollments(keyword=${keyword},courseId=${selectedCourseId},status=${selectedStatus},sortBy='status',direction=${sortBy == 'status' and direction == 'asc' ? 'desc' : 'asc'})}">
                                Status <i class="bi bi-arrow-down-up ms-1"></i>
                            </a>
                        </th>
                        <th>
                            <a class="text-decoration-none text-dark small fw-bold"
                               th:href="@{/admin/enrollments(keyword=${keyword},courseId=${selectedCourseId},status=${selectedStatus},sortBy='progress',direction=${sortBy == 'progress' and direction == 'asc' ? 'desc' : 'asc'})}">
                                Progress <i class="bi bi-arrow-down-up ms-1"></i>
                            </a>
                        </th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(enrollments)}">
                        <td colspan="7" class="text-center text-muted py-4">No enrollments found.</td>
                    </tr>
                    <tr th:each="e : ${enrollments}">
                        <td class="ps-3" th:text="${e.id}"></td>
                        <td>
                            <div class="fw-semibold" th:text="${e.courseTitle}"></div>
                            <small class="text-muted"
                                   th:text="${#numbers.formatDecimal(e.fee, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></small>
                        </td>
                        <td>
                            <div th:text="${e.fullName}"></div>
                            <small class="text-muted" th:text="${e.email}"></small>
                        </td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(e.enrolledAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                                <span class="badge rounded-pill"
                                      th:text="${e.status}"
                                      th:classappend="${e.status.name() == 'APPROVED'} ? 'bg-success'
                                                   : (${e.status.name() == 'REJECTED'} ? 'bg-danger'
                                                   : 'bg-warning text-dark')">
                                </span>
                        </td>
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="progress flex-grow-1 me-2" style="height: 6px;">
                                    <div class="progress-bar bg-primary" role="progressbar"
                                         th:style="'width: ' + ${e.progress} + '%'"
                                         th:aria-valuenow="${e.progress}"
                                         aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                                <small class="text-muted" th:text="${e.progress + '%'}"></small>
                            </div>
                        </td>
                        <td>
                            <div class="d-flex gap-1 justify-content-end pe-3">
                                <a th:href="@{/admin/enrollments/{id}/edit(id=${e.id})}"
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <button type="button"
                                        class="btn btn-sm btn-outline-danger"
                                        data-bs-toggle="modal"
                                        th:attr="data-bs-target='#deleteModal' + ${e.id}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-transparent" th:if="${page.totalPages > 1}">
            <div th:replace="~{fragments/pagination :: pagination(page=${page}, baseUrl='/admin/enrollments', queryString=${queryString})}"></div>
        </div>
    </div>

    <!-- Delete modals — đặt ngoài table để tránh HTML invalid -->
    <th:block th:each="e : ${enrollments}">
        <div th:replace="~{fragments/confirm-modal :: confirm-modal(
             modalId=${'deleteModal' + e.id},
             title='Delete Enrollment',
             message='Are you sure you want to delete this enrollment?',
             formAction=@{/admin/enrollments/{id}/delete(id=${e.id})},
             buttonLabel='Delete',
             buttonClass='btn-danger')}">
        </div>
    </th:block>

</div>
</body>
</html>
