<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title th:text="${isNew} ? 'New Enrollment' : 'Edit Enrollment'"></title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/admin/enrollments}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
        <h4 class="fw-bold mb-0" th:text="${isNew} ? 'New Enrollment' : 'Edit Enrollment'"></h4>
    </div>

    <div class="row">
        <div th:class="${isNew ? 'col-12' : 'col-lg-8'}">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="${isNew}
                                     ? @{/admin/enrollments}
                                     : @{/admin/enrollments/{id}(id=${dto.id})}"
                          th:object="${dto}"
                          method="post">

                        <div class="row g-3 mb-3">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold small text-muted">Course <span class="text-danger">*</span></label>
                                <select th:field="*{courseId}" class="form-select" required>
                                    <option value="">-- Select Course --</option>
                                    <option th:each="c : ${courses}"
                                            th:value="${c.id}"
                                            th:text="${c.title}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold small text-muted">Fee (₫)</label>
                                <div class="input-group">
                                    <input type="number" step="1000" min="0"
                                           th:field="*{fee}" class="form-control"
                                           placeholder="0"/>
                                    <span class="input-group-text small text-muted">₫</span>
                                </div>
                                <div class="form-text small">Leave empty to use course price.</div>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small text-muted">Username or Email</label>
                                <input type="text" th:field="*{usernameOrEmail}"
                                       class="form-control"
                                       placeholder="Link to existing user (optional)"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small text-muted">Full Name <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{fullName}"
                                       class="form-control" required placeholder="e.g. John Smith"/>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small text-muted">Email <span class="text-danger">*</span></label>
                                <input type="email" th:field="*{email}"
                                       class="form-control" required placeholder="e.g. john@example.com"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small text-muted">Mobile</label>
                                <input type="text" th:field="*{mobile}" class="form-control" placeholder="e.g. 0912345678"/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-muted">Enroll Reason</label>
                            <textarea th:field="*{enrollReason}" class="form-control" rows="3" placeholder="Why is this user enrolling?"></textarea>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold small text-muted d-block">Status</label>
                                <div class="btn-group w-100" role="group" aria-label="Status selection">
                                    <th:block th:each="s : ${statuses}">
                                        <input type="radio" class="btn-check" th:id="${'status_' + s}"
                                               th:field="*{status}" th:value="${s}" required>
                                        <label class="btn btn-sm"
                                               th:for="${'status_' + s}"
                                               th:text="${s}"
                                               th:classappend="${s.name() == 'APPROVED' ? 'btn-outline-success'
                                                              : (s.name() == 'REJECTED' ? 'btn-outline-danger'
                                                              : 'btn-outline-warning')}"></label>
                                    </th:block>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-muted">Rejected Notes</label>
                            <textarea th:field="*{rejectedNotes}" class="form-control" rows="2" placeholder="Notes if enrollment is rejected..."></textarea>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small text-muted">Progress (%)</label>
                                <div class="input-group">
                                    <input type="number" step="0.01" min="0" max="100"
                                           th:field="*{progress}" class="form-control"/>
                                    <span class="input-group-text small text-muted">%</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold small text-muted">Completed At</label>
                                <input type="datetime-local" th:field="*{completedAt}"
                                       class="form-control"/>
                            </div>
                        </div>

                        <hr class="text-muted opacity-25">

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn px-4"
                                    th:classappend="${isNew} ? 'btn-success' : 'btn-primary'">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:text="${isNew} ? 'Create Enrollment' : 'Save Changes'"></span>
                            </button>
                            <a th:href="@{/admin/enrollments}" class="btn btn-outline-secondary">Cancel</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-4" th:if="${!isNew}">
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-header bg-transparent border-0 pt-4 px-4 pb-0">
                    <h6 class="fw-bold mb-0">Metadata</h6>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label class="form-label small text-muted mb-1">Enrolled At</label>
                        <input type="text"
                               th:value="${dto.enrolledAt != null ? #temporals.format(dto.enrolledAt, 'dd/MM/yyyy HH:mm:ss') : 'N/A'}"
                               class="form-control form-control-sm bg-light" readonly/>
                    </div>
                    <div class="mb-0">
                        <label class="form-label small text-muted mb-1">Last Updated</label>
                        <input type="text"
                               th:value="${dto.lastUpdated != null ? #temporals.format(dto.lastUpdated, 'dd/MM/yyyy HH:mm:ss') : 'N/A'}"
                               class="form-control form-control-sm bg-light" readonly/>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
