<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head><title>User Management</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">User Management</h4>
        <a th:href="@{/admin/users/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-person-plus me-1"></i>Add User
        </a>
    </div>

    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form th:action="@{/admin/users}" method="get" class="row g-2 align-items-end">
                <input type="hidden" name="sortBy" th:value="${sortBy}">
                <input type="hidden" name="direction" th:value="${direction}">
                <div class="col-12 col-md-4">
                    <label class="form-label small text-muted mb-1">Name / Email</label>
                    <input type="text" name="search" class="form-control form-control-sm"
                           placeholder="Search by name or email"
                           th:value="${search}">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Role</label>
                    <select name="role" class="form-select form-select-sm">
                        <option value="">All Roles</option>
                        <option th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r}"
                                th:selected="${r == selectedRole}"></option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Status</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="">All Statuses</option>
                        <option th:each="s : ${statuses}"
                                th:value="${s}"
                                th:text="${s}"
                                th:selected="${s == selectedStatus}"></option>
                    </select>
                </div>
                <input type="hidden" name="size" th:value="${size}">
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-search me-1"></i>Filter
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary btn-sm ms-1">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3"><a class="text-decoration-none text-dark small fw-bold" th:href="@{/admin/users(search=${search},role=${selectedRole},status=${selectedStatus},sortBy='fullName',direction=${sortBy == 'fullName' and direction == 'asc' ? 'desc' : 'asc'})}">User <i class="bi bi-arrow-down-up ms-1"></i></a></th>
                            <th><a class="text-decoration-none text-dark small fw-bold" th:href="@{/admin/users(search=${search},role=${selectedRole},status=${selectedStatus},sortBy='username',direction=${sortBy == 'username' and direction == 'asc' ? 'desc' : 'asc'})}">Username <i class="bi bi-arrow-down-up ms-1"></i></a></th>
                            <th><a class="text-decoration-none text-dark small fw-bold" th:href="@{/admin/users(search=${search},role=${selectedRole},status=${selectedStatus},sortBy='email',direction=${sortBy == 'email' and direction == 'asc' ? 'desc' : 'asc'})}">Email <i class="bi bi-arrow-down-up ms-1"></i></a></th>
                            <th>Mobile</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th><a class="text-decoration-none text-dark small fw-bold" th:href="@{/admin/users(search=${search},role=${selectedRole},status=${selectedStatus},sortBy='createdAt',direction=${sortBy == 'createdAt' and direction == 'asc' ? 'desc' : 'asc'})}">Joined <i class="bi bi-arrow-down-up ms-1"></i></a></th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${users.empty}">
                            <td colspan="8" class="text-center text-muted py-4">No users found.</td>
                        </tr>
                        <tr th:each="u : ${users.content}">
                            <td class="ps-3">
                                <span class="fw-semibold" th:text="${u.fullName}"></span>
                            </td>
                            <td class="text-muted small" th:text="${u.username}"></td>
                            <td class="text-muted small" th:text="${u.email}"></td>
                            <td class="text-muted small" th:text="${u.mobile ?: '—'}"></td>
                            <td>
                                <span class="badge rounded-pill"
                                      th:text="${u.role}"
                                      th:classappend="${u.role.name() == 'ADMIN'} ? 'bg-danger'
                                                   : (${u.role.name() == 'MANAGER'} ? 'bg-warning text-dark'
                                                   : (${u.role.name() == 'MARKETING'} ? 'bg-purple'
                                                   : 'bg-primary'))"
                                      th:style="${u.role.name() == 'MARKETING'} ? 'background:#6f42c1' : ''">
                                </span>
                            </td>
                            <td>
                                <span class="badge rounded-pill"
                                      th:text="${u.status}"
                                      th:classappend="${u.status.name() == 'ACTIVE'} ? 'bg-success'
                                                   : (${u.status.name() == 'INACTIVE'} ? 'bg-secondary'
                                                   : 'bg-warning text-dark')">
                                </span>
                            </td>
                            <td class="text-muted small"
                                th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}"></td>
                            <td>
                                <a th:href="@{/admin/users/{id}(id=${u.id})}"
                                   class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <button type="button"
                                        class="btn btn-sm btn-outline-danger"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#deleteUser-' + ${u.id}">
                                    <i class="bi bi-trash"></i>
                                </button>
                                <div th:replace="~{fragments/confirm-modal :: confirm-modal(
                                    modalId=${'deleteUser-' + u.id},
                                    title='Delete User',
                                    message=${'Are you sure you want to delete ' + u.fullName + '? This action cannot be undone.'},
                                    formAction=${'/admin/users/' + u.id + '/delete'},
                                    buttonLabel='Delete',
                                    buttonClass='btn-danger'
                                )}"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-transparent" th:if="${users.totalPages > 1}">
            <div th:replace="~{fragments/pagination :: pagination(page=${users}, baseUrl='/admin/users', queryString=${queryString})}"></div>
        </div>
    </div>
</div>
</body>
</html>
