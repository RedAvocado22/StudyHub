<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head><title>Add User</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/admin/users}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
        <h4 class="fw-bold mb-0">Add User</h4>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/users}" method="post" enctype="multipart/form-data" th:object="${createUserDTO}">
                <div class="mb-4 d-flex flex-column align-items-center gap-2">
                    <div id="avatarPreview"
                         class="rounded-circle bg-secondary bg-opacity-25 d-flex align-items-center justify-content-center overflow-hidden"
                         style="width:96px;height:96px;flex-shrink:0;">
                        <i id="avatarIcon" class="bi bi-person-fill fs-1 text-secondary"></i>
                        <img id="avatarImg" class="d-none w-100 h-100" style="object-fit:cover;" alt="Avatar preview">
                    </div>
                    <label class="btn btn-outline-secondary btn-sm mb-0">
                        <i class="bi bi-upload me-1"></i>Upload Avatar
                        <input type="file" name="avatar" accept="image/*" class="d-none"
                               onchange="previewAvatar(this)">
                    </label>
                    <small class="text-muted">Optional · jpg, png, gif, webp · max 10 MB</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="fullName" class="form-control" required
                           th:value="*{fullName}" placeholder="e.g. John Smith">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required
                           th:value="*{email}" placeholder="e.g. john@example.com">
                    <div class="form-text">Login credentials will be sent to this address.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mobile <span class="text-muted">(optional)</span></label>
                    <input type="text" name="mobile" class="form-control"
                           th:value="*{mobile}" placeholder="e.g. 0912345678">
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select" required>
                            <option value="">Select role</option>
                            <option th:each="r : ${roles}"
                                    th:value="${r}"
                                    th:text="${r}"
                                    th:selected="${createUserDTO.role == r}"></option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select" required>
                            <option value="">Select status</option>
                            <option th:each="s : ${statuses}"
                                    th:value="${s}"
                                    th:text="${s}"
                                    th:selected="${createUserDTO.status == s}"></option>
                        </select>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-person-plus me-1"></i>Create &amp; Send Credentials
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    <script>
        function previewAvatar(input) {
            if (!input.files || !input.files[0]) return;
            const img = document.getElementById('avatarImg');
            const icon = document.getElementById('avatarIcon');
            img.src = URL.createObjectURL(input.files[0]);
            img.classList.remove('d-none');
            icon.classList.add('d-none');
        }
    </script>
</div>
</body>
</html>
