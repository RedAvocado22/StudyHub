<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head><title>Course Detail</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/admin/courses}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
        <h4 class="fw-bold mb-0" th:text="${course.title}"></h4>
        <span th:if="${course.published}" class="badge bg-success ms-1">Published</span>
        <span th:unless="${course.published}" class="badge bg-secondary ms-1">Draft</span>
        <button type="submit" form="courseForm" class="btn btn-primary btn-sm ms-auto">
            <i class="bi bi-save me-1"></i>Save Changes
        </button>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-4">
        <li class="nav-item">
            <a class="nav-link active" href="#">General Info</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/courses/{id}/content(id=${course.id})}">Course Content</a>
        </li>
    </ul>

    <form id="courseForm" th:action="@{/admin/courses/{id}(id=${course.id})}" method="post">

        <div class="row g-3">

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-header bg-transparent fw-semibold">Thumbnail</div>
                    <div class="card-body">
                        <img id="thumbnailPreview"
                             th:if="${course.thumbnailUrl != null}"
                             th:src="${course.thumbnailUrl}"
                             class="img-fluid rounded mb-3 w-100"
                             style="height:180px;object-fit:cover;" alt="Thumbnail">
                        <div th:unless="${course.thumbnailUrl != null}"
                             id="thumbnailPreview"
                             class="bg-light rounded d-flex align-items-center justify-content-center mb-3"
                             style="height:180px;">
                            <i class="bi bi-image text-secondary fs-1"></i>
                        </div>
                        <input type="text" name="thumbnailUrl" class="form-control form-control-sm"
                               placeholder="Image URL" th:value="${course.thumbnailUrl}"
                               oninput="document.getElementById('thumbnailPreview').src = this.value">
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-transparent fw-semibold">Meta</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label small text-muted mb-1">Status</label>
                            <select name="published" class="form-select form-select-sm">
                                <option value="true"  th:selected="${course.published}">Published</option>
                                <option value="false" th:selected="${!course.published}">Draft</option>
                            </select>
                        </div>
                        <dl class="row small mb-0">
                            <dt class="col-5 text-muted fw-normal">Created</dt>
                            <dd class="col-7" th:text="${#temporals.format(course.createdAt, 'dd/MM/yyyy')}"></dd>
                            <dt class="col-5 text-muted fw-normal">Updated</dt>
                            <dd class="col-7 mb-0" th:text="${#temporals.format(course.updatedAt, 'dd/MM/yyyy')}"></dd>
                        </dl>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-transparent fw-semibold">Course Info</div>
                    <div class="card-body d-flex flex-column">
                        <div class="mb-3">
                            <label class="form-label small text-muted mb-1">Title</label>
                            <input type="text" name="title" class="form-control"
                                   th:value="${course.title}" required>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label small text-muted mb-1">Category</label>
                                <select name="categoryId" class="form-select">
                                    <option value="">— None —</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.id}"
                                            th:text="${cat.name}"
                                            th:selected="${cat.name == course.categoryName}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted mb-1">Manager</label>
                                <select name="managerId" class="form-select">
                                    <option th:each="m : ${managers}"
                                            th:value="${m.id}"
                                            th:text="${m.fullName}"
                                            th:selected="${m.id == course.managerId}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <label class="form-label small text-muted mb-1">Level</label>
                                <select name="level" class="form-select">
                                    <option th:each="lv : ${levels}"
                                            th:value="${lv}"
                                            th:text="${lv}"
                                            th:selected="${lv == course.level}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small text-muted mb-1">Duration (hours)</label>
                                <input type="number" name="durationHours" class="form-control"
                                       th:value="${course.durationHours}" min="1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small text-muted mb-1">Price (₫)</label>
                                <input type="number" name="price" class="form-control"
                                       th:value="${course.price}" min="0" step="1000">
                            </div>
                        </div>
                        <div class="flex-grow-1 d-flex flex-column">
                            <label class="form-label small text-muted mb-1">Description</label>
                            <textarea name="description" class="form-control flex-grow-1"
                                      th:text="${course.description}"></textarea>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </form>
</div>
</body>
</html>
