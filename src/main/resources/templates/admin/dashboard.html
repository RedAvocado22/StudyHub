<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head><title>Dashboard</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Dashboard</h4>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                        <i class="bi bi-people-fill text-primary fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Total Users</div>
                        <div class="fw-bold fs-4" th:text="${userStats['totalUsers']}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3">
                        <i class="bi bi-book-fill text-success fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Published Courses</div>
                        <div class="fw-bold fs-4" th:text="${totalCourses}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-warning bg-opacity-10 p-3">
                        <i class="bi bi-person-check-fill text-warning fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Active Users</div>
                        <div class="fw-bold fs-4" th:text="${userStats['active']}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-danger bg-opacity-10 p-3">
                        <i class="bi bi-person-x-fill text-danger fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Inactive / Unverified</div>
                        <div class="fw-bold fs-4"
                             th:text="${userStats['inactive'] + userStats['unverified']}">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-transparent fw-semibold">Users by Role</div>
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                        <span><i class="bi bi-shield-fill text-danger me-2"></i>Admin</span>
                        <span class="badge bg-danger rounded-pill" th:text="${userStats['admins']}">0</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                        <span><i class="bi bi-person-badge-fill text-warning me-2"></i>Manager</span>
                        <span class="badge bg-warning text-dark rounded-pill" th:text="${userStats['managers']}">0</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                        <span><i class="bi bi-megaphone-fill text-purple me-2" style="color:#6f42c1"></i>Marketing</span>
                        <span class="badge rounded-pill" style="background:#6f42c1" th:text="${userStats['marketing']}">0</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center py-2">
                        <span><i class="bi bi-person-fill text-primary me-2"></i>Member</span>
                        <span class="badge bg-primary rounded-pill" th:text="${userStats['members']}">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-transparent fw-semibold">Users by Status</div>
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                        <span><i class="bi bi-check-circle-fill text-success me-2"></i>Active</span>
                        <span class="badge bg-success rounded-pill" th:text="${userStats['active']}">0</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                        <span><i class="bi bi-slash-circle-fill text-secondary me-2"></i>Inactive</span>
                        <span class="badge bg-secondary rounded-pill" th:text="${userStats['inactive']}">0</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center py-2">
                        <span><i class="bi bi-hourglass-split text-warning me-2"></i>Unverified</span>
                        <span class="badge bg-warning text-dark rounded-pill" th:text="${userStats['unverified']}">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
