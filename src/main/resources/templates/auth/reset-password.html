<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}">
<head>
    <title>New Password</title>
</head>
<body>
<div layout:fragment="content">

    <h5 class="card-title mb-4 fw-bold">New Password</h5>

    <form th:action="@{/reset-password}" th:object="${resetDTO}" method="post" novalidate>
        <input type="hidden" th:field="*{token}">
        <div class="mb-3">
            <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
            <input type="password" id="password" th:field="*{password}" class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                   placeholder="Minimum 8 characters">
            <div class="invalid-feedback" th:errors="*{password}"></div>
        </div>
        <div class="mb-4">
            <label for="passwordConfirm" class="form-label">Password Confirm <span class="text-danger">*</span></label>
            <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" class="form-control"
                   th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'is-invalid'"
                   placeholder="Re-enter your password">
            <div class="invalid-feedback" th:errors="*{passwordConfirm}"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Submit</button>
    </form>

</div>
</body>
</html>
