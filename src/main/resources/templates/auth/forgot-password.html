<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}">
<head>
    <title>Forgot Password</title>
</head>
<body>
<div layout:fragment="content">

    <h5 class="card-title mb-4 fw-bold">Password Reset</h5>

    <p class="text-muted small mb-3">
        Enter your registered email and we'll send you a password reset link.
    </p>

    <form th:action="@{/forgot-password}" th:object="${forgotDTO}" method="post" novalidate>
        <div class="mb-4">
            <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
            <input type="email" id="email" th:field="*{email}" class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="Enter your email" autofocus>
            <div class="invalid-feedback" th:errors="*{email}"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Get Password Recovery Email</button>
        <div class="d-flex justify-content-between mt-3">
            <a th:href="@{/login}" class="small text-decoration-none">Back to login</a>
            <a th:href="@{/register}" class="small text-decoration-none">Register new account</a>
        </div>
    </form>

</div>
</body>
</html>
