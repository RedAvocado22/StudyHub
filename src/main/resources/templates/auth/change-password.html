<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}">
<head>
    <title>Change Password</title>
</head>
<body>
<div layout:fragment="content">

    <h5 class="card-title mb-4 fw-bold">Password Change</h5>

    <form th:action="@{/change-password}" th:object="${changeDTO}" method="post" novalidate>
        <div class="mb-3">
            <label for="currentPassword" class="form-label">Current Password <span class="text-danger">*</span></label>
            <input type="password" id="currentPassword" th:field="*{currentPassword}" class="form-control"
                   th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'"
                   placeholder="Enter current password">
            <div class="invalid-feedback" th:errors="*{currentPassword}"></div>
        </div>
        <div class="mb-3">
            <label for="newPassword" class="form-label">New Password <span class="text-danger">*</span></label>
            <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control"
                   th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
                   placeholder="Minimum 8 characters">
            <div class="invalid-feedback" th:errors="*{newPassword}"></div>
        </div>
        <div class="mb-4">
            <label for="newPasswordConfirm" class="form-label">New Password Confirm <span class="text-danger">*</span></label>
            <input type="password" id="newPasswordConfirm" th:field="*{newPasswordConfirm}" class="form-control"
                   th:classappend="${#fields.hasErrors('newPasswordConfirm')} ? 'is-invalid'"
                   placeholder="Re-enter new password">
            <div class="invalid-feedback" th:errors="*{newPasswordConfirm}"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Submit</button>
    </form>

</div>
</body>
</html>
