<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Change Password - StudyHub</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Header -->
    <section class="bg-primary text-white py-4 mb-4">
        <div class="container">
            <h1 class="fw-bold mb-0">Security Settings</h1>
            <p class="lead mb-0 small opacity-75">Update your password to keep your account secure.</p>
        </div>
    </section>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-transparent p-4 border-bottom">
                        <div class="d-flex align-items-center">
                            <a th:href="@{/profile}" class="btn btn-sm btn-outline-secondary me-3">
                                <i class="bi bi-arrow-left"></i>
                            </a>
                            <h5 class="fw-bold mb-0">Change Password</h5>
                        </div>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/change-password}" th:object="${changeDTO}" method="post" novalidate>
                            
                            <div class="mb-4">
                                <label for="currentPassword" class="form-label small text-muted mb-1">Current Password <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-shield-lock text-muted"></i></span>
                                    <input type="password" id="currentPassword" th:field="*{currentPassword}" class="form-control"
                                           th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'"
                                           placeholder="Enter current password">
                                </div>
                                <div class="invalid-feedback d-block" th:errors="*{currentPassword}"></div>
                            </div>

                            <hr class="my-4 opacity-50">

                            <div class="mb-3">
                                <label for="newPassword" class="form-label small text-muted mb-1">New Password <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-key text-muted"></i></span>
                                    <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control"
                                           th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
                                           placeholder="Minimum 8 characters">
                                </div>
                                <div class="invalid-feedback d-block" th:errors="*{newPassword}"></div>
                            </div>

                            <div class="mb-4">
                                <label for="newPasswordConfirm" class="form-label small text-muted mb-1">Confirm New Password <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-key-fill text-muted"></i></span>
                                    <input type="password" id="newPasswordConfirm" th:field="*{newPasswordConfirm}" class="form-control"
                                           th:classappend="${#fields.hasErrors('newPasswordConfirm')} ? 'is-invalid'"
                                           placeholder="Re-enter new password">
                                </div>
                                <div class="invalid-feedback d-block" th:errors="*{newPasswordConfirm}"></div>
                            </div>

                            <div class="mt-5">
                                <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">
                                    <i class="bi bi-check2-circle me-2"></i>Update Password
                                </button>
                                <a th:href="@{/profile}" class="btn btn-link w-100 text-muted mt-3 text-decoration-none small">
                                    Cancel and return to profile
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card bg-light border-0 mt-4">
                    <div class="card-body p-4 small text-muted">
                        <h6 class="fw-bold text-dark mb-2"><i class="bi bi-info-circle me-2"></i>Password Requirements:</h6>
                        <ul class="mb-0 ps-3">
                            <li>Must be at least 8 characters long.</li>
                            <li>Should include a mix of letters, numbers, and symbols.</li>
                            <li>Should not be the same as your current password.</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
