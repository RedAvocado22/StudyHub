<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}">
<head>
    <title>Login</title>
</head>
<body>
<div layout:fragment="content">

    <h5 class="card-title mb-4 fw-bold">User Login</h5>

    <div th:if="${param.unverified}" class="border border-warning rounded p-3 mb-3 bg-warning-subtle">
        <p class="mb-2 small fw-semibold"><i class="bi bi-envelope me-1"></i>Resend verification email</p>
        <form th:action="@{/resend-verification}" method="post" class="d-flex gap-2">
            <input type="email" name="email" class="form-control form-control-sm"
                   placeholder="Enter your email" required>
            <button type="submit" class="btn btn-warning btn-sm text-nowrap">Resend</button>
        </form>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Email or Username <span class="text-danger">*</span></label>
            <input type="text" id="username" name="username" class="form-control"
                   th:value="${loginUsername}"
                   placeholder="Enter email or username" required autofocus>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Enter password" required>
        </div>
        <div class="d-flex justify-content-between mb-3">
            <a th:href="@{/forgot-password}" class="small text-decoration-none">Forgot Password?</a>
            <a th:href="@{/register}" class="small text-decoration-none">Don't have an account?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

</div>
</body>
</html>
