<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Server Error</title></head>
<body>
<div layout:fragment="content" class="container py-5 text-center">
    <div class="display-1 fw-bold text-warning mb-3">500</div>
    <h2 class="fw-semibold mb-2">Something Went Wrong</h2>
    <p class="text-muted mb-4">An unexpected error occurred on our end. Please try again later.</p>
    <a th:href="@{/}" class="btn btn-primary">
        <i class="bi bi-house me-1"></i>Back to Home
    </a>
</div>
</body>
</html>
