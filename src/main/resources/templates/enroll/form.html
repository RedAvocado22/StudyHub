<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Learning Enrollment</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">

                <h4 class="fw-bold mb-4">Learning Enrollment</h4>

                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form th:action="@{/courses/{id}/enroll(id=${course.id})}"
                              th:object="${dto}"
                              method="post">
                            <input type="hidden" th:field="*{courseId}"/>

                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Course</label>
                                    <input type="text" class="form-control bg-light"
                                           th:value="${course.title}" readonly/>
                                </div>
                                <div class="col-auto">
                                    <label class="form-label">Total Fee ($)</label>
                                    <input type="text" class="form-control bg-light"
                                           th:value="${course.price}" readonly/>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label fw-semibold">
                                        Full Name <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" th:field="*{fullName}"
                                           class="form-control bg-light" readonly/>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        Email <span class="text-danger">*</span>
                                    </label>
                                    <input type="email" th:field="*{email}"
                                           class="form-control bg-light" readonly/>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label fw-semibold">Mobile</label>
                                    <input type="text" th:field="*{mobile}"
                                           class="form-control bg-light"
                                           readonly
                                           placeholder="No mobile number provided"/>

                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        Payment Method <span class="text-danger">*</span>
                                    </label>
                                    <div class="mt-2 d-flex gap-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio"
                                                   th:field="*{paymentMethod}"
                                                   value="BANK_TRANSFER" id="payBank"/>
                                            <label class="form-check-label" for="payBank">
                                                Bank Transfer
                                            </label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio"
                                                   th:field="*{paymentMethod}"
                                                   value="INTERNET_BANKING" id="payOnline"/>

                                            <label class="form-check-label" for="payOnline">
                                                Internet Banking
                                            </label>
                                        </div>
                                    </div>
                                    <div th:if="${#fields.hasErrors('paymentMethod')}"
                                         class="text-danger small mt-1"
                                         th:errors="*{paymentMethod}"></div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Enroll Note</label>
                                <textarea th:field="*{enrollNote}"
                                          class="form-control" rows="3"></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-credit-card me-2"></i>Submit
                            </button>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
