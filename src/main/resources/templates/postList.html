<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head><title>Post List</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Post List</h4>
        <a th:href="@{/admin/post/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-person-plus me-1"></i>New Post
        </a>
    </div>

    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form th:action="@{/admin/post/filter}" method="post" class="row g-2 align-items-end">
                <div class="col-12 col-md-4">
                    <label class="form-label small text-muted mb-1">Title</label>
                    <input type="text" name="title" class="form-control form-control-sm"
                           placeholder="Type title to search"
                           th:value="${title ?: ''}">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Categories</label>
                    <select name="category" class="form-select form-select-sm">
                        <option value="">All Categories</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.name}"
                                th:text="${c.name}"
                                th:selected="${c.name == category}"></option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Authors</label>
                    <select name="author" class="form-select form-select-sm">
                        <option value="">All Authors</option>
                        <option th:each="a : ${authors}"
                                th:value="${a.fullName}"
                                th:text="${a.fullName}"
                                th:selected="${a.fullName == author}"></option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-search me-1"></i>Search
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Id</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Author</th>
                        <th>Comment</th>
                        <th>Status</th>
                        <th>Updated At</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${posts.empty}">
                        <td colspan="8" class="text-center text-muted py-4">No posts found.</td>
                    </tr>
                    <tr th:each="p : ${posts}">
                        <td class="text-muted small" th:text="${p.id}"></td>
                        <td class="text-muted small" th:text="${p.title}"></td>
                        <td class="text-muted small" th:text="${p.category.name}"></td>
                        <td class="text-muted small" th:text="${p.author.fullName}"></td>
                        <td class="text-muted small" th:text="${p.comments.size()}"></td>
                        <td>
                                <span class="text-muted small"
                                      th:text="${p.status}">
                                </span>
                        </td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(p.updatedAt, 'dd/MM/yyyy')}"></td>
                        <td>
                            <a th:href="@{/admin/post/update/{id}(id=${p.id})}"
                               class="btn btn-sm btn-outline-primary">Edit
                            </a>
                            <a th:href="@{/admin/post/switch(status=${p.status},id=${p.id})}"
                               class="btn btn-sm btn-outline-primary">Show
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
