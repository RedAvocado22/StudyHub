<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title>Public Courses</title>
</head>
<body>
<div layout:fragment="content">

    <section class="py-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">Public Courses</h2>
                <span class="text-muted" th:text="${#lists.size(courses)} + ' active courses'"></span>
            </div>

            <form th:action="@{/courses}" method="get" class="mb-4">
                <div class="row g-2 align-items-end">
                    <div class="col-12 col-md-6">
                        <input type="text"
                               class="form-control"
                               name="keyword"
                               th:value="${keyword}"
                               placeholder="Search courses by name or description...">
                    </div>
                    <div class="col-12 col-md-3">
                        <select name="categoryId" class="form-select">
                            <option value="">All Categories</option>
                            <option th:each="c : ${categories}"
                                    th:value="${c.id}"
                                    th:text="${c.name}"
                                    th:selected="${c.id == selectedCategory}"></option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <button class="btn btn-outline-primary" type="submit">
                            <i class="bi bi-search me-1"></i>Filter
                        </button>
                        <a th:href="@{/courses}" class="btn btn-outline-secondary ms-1">Clear</a>
                    </div>
                </div>
            </form>

            <div class="row g-4" th:if="${not #lists.isEmpty(courses)}">
                <div class="col-md-6 col-lg-4" th:each="course : ${courses}">
                    <div class="card h-100 shadow-sm border-0">
                        <a th:href="@{/courses/{id}(id=${course.id})}" class="ratio ratio-16x9">
                            <img th:src="${course.thumbnailUrl}"
                                 th:alt="${course.title}"
                                 class="rounded-top object-fit-cover">
                        </a>
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="badge bg-secondary-subtle text-secondary"
                                      th:text="${course.categoryName} ?: 'General'"></span>
                                <span class="badge"
                                      th:classappend="${course.level.name() == 'BEGINNER' ? 'bg-success' :
                                                       course.level.name() == 'INTERMEDIATE' ? 'bg-warning text-dark' :
                                                       'bg-danger'}"
                                      th:text="${course.level}"></span>
                            </div>
                            <h5 class="card-title fw-semibold">
                                <a th:href="@{/courses/{id}(id=${course.id})}" th:text="${course.title}"
                                   class="text-decoration-none text-dark"></a>
                            </h5>
                            <p class="card-text text-muted small flex-grow-1"
                               th:text="${#strings.abbreviate(course.description ?: '', 120)}"></p>

                            <div class="d-flex align-items-center text-muted small mb-3"
                                 th:if="${course.durationHours != null}">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${course.durationHours} + ' hours'"></span>
                            </div>

                            <div class="mt-auto pt-2 border-top">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="fw-bold text-primary fs-5"
                                          th:text="${#numbers.formatDecimal(course.price, 1, 'COMMA', 0, 'NONE') + ' ₫'}"></span>
                                    <a th:href="@{/courses/{id}(id=${course.id})}"
                                       class="btn btn-outline-secondary btn-sm">
                                        <i class="bi bi-info-circle me-1"></i>Details
                                    </a>
                                </div>

                                <div sec:authorize="isAnonymous()">
                                    <a th:href="@{/courses/{id}/enroll(id=${course.id})}"
                                       class="btn btn-primary btn-sm w-100">
                                        <i class="bi bi-plus-circle me-1"></i>Enroll Now
                                    </a>
                                </div>

                                <div sec:authorize="isAuthenticated()">
                                    <a th:if="${!enrolledCourseIds.contains(course.id)}"
                                       th:href="@{/courses/{id}/enroll(id=${course.id})}"
                                       class="btn btn-primary btn-sm w-100">
                                        <i class="bi bi-plus-circle me-1"></i>Enroll Now
                                    </a>
                                    <button th:if="${enrolledCourseIds.contains(course.id)}"
                                            class="btn btn-success btn-sm w-100 disabled" disabled>
                                        <i class="bi bi-check-circle me-1"></i>Enrolled
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center text-muted py-5" th:if="${#lists.isEmpty(courses)}">
                <i class="bi bi-collection display-4 d-block mb-3"></i>
                <p class="mb-0">No courses matching your search.</p>
            </div>
        </div>
    </section>

</div>
</body>
</html>
