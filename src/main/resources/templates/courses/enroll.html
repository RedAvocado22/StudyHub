<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="'Enroll in ' + ${course.title} + ' - StudyHub'">Enroll</title>
</head>
<body>
<div layout:fragment="content">

    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-7">

                    <nav aria-label="breadcrumb" class="mb-4">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a th:href="@{/courses}" class="text-decoration-none">Courses</a>
                            </li>
                            <li class="breadcrumb-item">
                                <a th:href="@{/courses/{id}(id=${course.id})}"
                                   th:text="${#strings.abbreviate(course.title, 30)}"
                                   class="text-decoration-none"></a>
                            </li>
                            <li class="breadcrumb-item active" aria-current="page">Enroll</li>
                        </ol>
                    </nav>

                    <!-- Course Summary Card -->
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-body p-4">
                            <div class="d-flex gap-3 align-items-center">
                                <div class="ratio ratio-16x9 rounded overflow-hidden flex-shrink-0"
                                     style="width: 120px;">
                                    <img th:if="${course.thumbnailUrl != null}"
                                         th:src="${course.thumbnailUrl}"
                                         th:alt="${course.title}"
                                         class="object-fit-cover">
                                    <div th:unless="${course.thumbnailUrl != null}"
                                         class="bg-secondary bg-opacity-25 d-flex align-items-center justify-content-center">
                                        <i class="bi bi-book text-secondary fs-4"></i>
                                    </div>
                                </div>
                                <div>
                                    <h5 class="fw-bold mb-1" th:text="${course.title}"></h5>
                                    <div class="d-flex gap-2 align-items-center flex-wrap">
                                        <span class="badge bg-secondary-subtle text-secondary"
                                              th:text="${course.categoryName}"></span>
                                        <span class="badge rounded-pill"
                                              th:classappend="${course.level.name() == 'BEGINNER' ? 'bg-success' :
                                                               course.level.name() == 'INTERMEDIATE' ? 'bg-warning text-dark' : 'bg-danger'}"
                                              th:text="${course.level}"></span>
                                    </div>
                                    <div class="fw-bold text-primary mt-2"
                                         th:text="${#numbers.formatDecimal(course.price, 1, 'COMMA', 0, 'NONE') + ' ₫'}"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Enrollment Form -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-transparent p-4 border-bottom">
                            <h4 class="fw-bold mb-0">
                                <i class="bi bi-pencil-square me-2"></i>Enrollment Details
                            </h4>
                        </div>
                        <div class="card-body p-4">
                            <form th:action="@{/courses/{id}/enroll(id=${course.id})}"
                                  th:object="${enrollmentDTO}"
                                  method="post">
                                <input type="hidden" th:field="*{courseId}">

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                                    <input type="text" th:field="*{fullName}" class="form-control"
                                           placeholder="Enter your full name" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
                                    <input type="email" th:field="*{email}" class="form-control"
                                           placeholder="Enter your email" required>
                                    <div class="form-text text-muted">
                                        If you don't have an account, one will be created automatically.
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Phone Number</label>
                                    <input type="text" th:field="*{mobile}" class="form-control"
                                           placeholder="Enter your phone number">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Reason for Enrolling</label>
                                    <textarea th:field="*{enrollReason}" class="form-control" rows="3"
                                              placeholder="Tell us why you want to take this course..."></textarea>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-semibold">Payment Method</label>
                                    <select th:field="*{paymentMethod}" class="form-select">
                                        <option value="">— Select payment method —</option>
                                        <option th:each="pm : ${paymentMethods}"
                                                th:value="${pm}"
                                                th:text="${pm.name().replace('_', ' ')}"></option>
                                    </select>
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary px-5 py-2 fw-semibold">
                                        <i class="bi bi-send me-2"></i>Submit Enrollment
                                    </button>
                                    <a th:href="@{/courses/{id}(id=${course.id})}"
                                       class="btn btn-outline-secondary px-4 py-2">
                                        Cancel
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

</div>
</body>
</html>
