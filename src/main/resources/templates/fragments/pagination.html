<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="pagination(page, baseUrl, queryString)" aria-label="Pagination"
     th:if="${page.totalPages > 1}">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <small class="text-muted">
            Showing
            <span th:text="${page.number * page.size + 1}"></span>–<span th:text="${T(java.lang.Math).min((page.number + 1) * page.size, page.totalElements)}"></span>
            of <span th:text="${page.totalElements}"></span> results
        </small>

        <ul class="pagination mb-0">
            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link"
                   th:href="${baseUrl + '?page=' + (page.number - 1) + queryString}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>

            <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                <li class="page-item" th:classappend="${i == page.number} ? 'active'"
                    th:if="${i == 0 or i == page.totalPages - 1 or (i >= page.number - 2 and i <= page.number + 2)}">
                    <a class="page-link"
                       th:href="${baseUrl + '?page=' + i + queryString}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item disabled"
                    th:if="${(i == 1 and page.number > 3) or (i == page.totalPages - 2 and page.number < page.totalPages - 4)}">
                    <span class="page-link">…</span>
                </li>
            </th:block>

            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link"
                   th:href="${baseUrl + '?page=' + (page.number + 1) + queryString}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>

        <div class="d-flex align-items-center gap-2">
            <label class="text-muted small mb-0">Rows:</label>
            <select class="form-select form-select-sm" style="width: auto;"
                    onchange="window.location.href = this.dataset.base + '?page=0' + this.dataset.query + '&size=' + this.value"
                    th:attr="data-base=${baseUrl}, data-query=${#strings.replace(queryString, '&size=' + page.size, '')}">
                <option th:each="s : ${#arrays.toIntArray({10, 20, 50})}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${s == page.size}"></option>
            </select>
        </div>
    </div>
</nav>

</body>
</html>
