<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="sidebar" class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white"
     style="width: 240px; min-height: calc(100vh - 56px);">
    <ul class="nav nav-pills flex-column mb-auto gap-1">
        <li class="nav-item">
            <a th:href="@{/admin}" class="nav-link text-white"
               th:classappend="${requestURI == '/admin'} ? 'active' : ''">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
        </li>

        <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
            <a th:href="@{/admin/users}" class="nav-link text-white"
               th:classappend="${requestURI.startsWith('/admin/users')} ? 'active' : ''">
                <i class="bi bi-people me-2"></i>Users
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/admin/courses}" class="nav-link text-white"
               th:classappend="${requestURI.startsWith('/admin/courses')} ? 'active' : ''">
                <i class="bi bi-book me-2"></i>Courses
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/admin/enrollments}" class="nav-link text-white"
               th:classappend="${requestURI.startsWith('/admin/enrollments')} ? 'active' : ''">
                <i class="bi bi-person-check me-2"></i>Enrollments
            </a>
        </li>

        <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
            <a th:href="@{/admin/settings}" class="nav-link text-white"
               th:classappend="${requestURI.startsWith('/admin/settings')} ? 'active' : ''">
                <i class="bi bi-gear me-2"></i>Settings
            </a>
        </li>
    </ul>
</nav>
</body>
</html>
